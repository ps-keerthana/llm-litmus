name: LLM Eval Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Concurrency control: only one evaluation job runs at a time per branch.
# If a new push arrives while CI is running, the in-progress job is cancelled
# and the new one starts. This prevents multiple jobs competing for the same
# Groq org-level token quota simultaneously.
concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Evaluation Suite (Smoke Test)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Smoke mode: 10 queries (2/category, seed=42), no LLM judge.
          #
          # Why --no-judge:
          #   Each generation call uses ~500 tokens. The judge would add another
          #   ~900 tokens per query. With 10 queries, that doubles API usage from
          #   ~5,000 to ~14,000 tokens — plus 10 extra RPM slots.
          #   On a free-tier Groq account this is risky if the account was also
          #   used locally in the same minute window.
          #
          # Why this is safe:
          #   The CI gate checks pass_rate and retrieval_hit_rate, which are
          #   measured using local semantic similarity (no API calls).
          #   Hallucination gating runs on full evaluations triggered manually
          #   or on a schedule (see CONTRIBUTING.md).
          python evaluate.py --smoke --no-judge

      - name: Verify CI Quality Gate & Regressions
        run: python ci_gate.py

      - name: Publish Actions Step Summary
        if: always()
        run: |
          if [ -f eval_summary.md ]; then
            cat eval_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Detailed Run Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: eval_results/
          retention-days: 30

      # Auto-commit metrics_history.json back to main on successful merge.
      # Uses --rebase to handle concurrent push conflicts gracefully.
      - name: Auto-Commit Metrics Trend History
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics_history.json
          git diff --cached --quiet || (git pull --rebase && git commit -m "ci: update metrics trend history [skip ci]" && git push)

      # Post evaluation summary comment directly into Pull Requests
      - name: Post Evaluation Comment to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('eval_summary.md')) {
              const body = fs.readFileSync('eval_summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }