name: Nightly LLM Evaluation Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Every night at midnight UTC
  workflow_dispatch:      # Manual trigger from GHA UI

concurrency:
  group: eval-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate-full:
    runs-on: ubuntu-latest
    timeout-minutes: 180      # 204 queries + LLM judge calls @ 12 RPM ≈ 34 min API + overhead

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache SQLite Evaluation Database
        uses: actions/cache@v4
        with:
          path: eval_platform.db
          key: ${{ runner.os }}-eval-db-v1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-eval-db-v1-

      - name: Run Full Evaluation (All golden questions, LLM judge enabled, no diagnoser)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Full mode: all 204 queries, LLM judge ON for faithfulness/hallucination,
          # counterfactual diagnoser OFF to prevent post-failure API bursts.
          # Proactive scheduler paces at 12 RPM / 12,000 TPM — no reactive 429 waits.
          python evaluate.py --no-diag

      - name: Verify Quality Gate (Full Mode & Regressions)
        run: python ci_gate.py --mode full

      - name: Publish Actions Step Summary
        if: always()
        run: |
          if [ -f eval_summary.md ]; then
            cat eval_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Detailed Run Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-full-${{ github.run_id }}
          path: eval_results/
          retention-days: 30
