name: Nightly LLM Evaluation Pipeline

on:
  schedule:
    - cron: '0 0 * * *'  # Every night at midnight UTC
  workflow_dispatch:      # Manual trigger from GHA UI

concurrency:
  group: eval-full-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate-full:
    runs-on: ubuntu-latest
    timeout-minutes: 180      # 204 queries + LLM judge calls @ 12 RPM ≈ 34 min API + overhead

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache SQLite Evaluation Database
        uses: actions/cache@v4
        with:
          path: eval_platform.db
          key: ${{ runner.os }}-eval-db-v1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-eval-db-v1-

      - name: Start Ollama Service and Pull Model
        run: |
          docker run -d -v ollama:/root/.ollama -p 11434:11434 --name ollama ollama/ollama

          # Wait until Ollama API is reachable (up to 60 seconds)
          echo "Waiting for Ollama service to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:11434/api/tags > /dev/null 2>&1; then
              echo "Ollama is ready after ${i}s"
              break
            fi
            sleep 2
          done

          # Pull the model (cached in volume on subsequent runs)
          docker exec ollama ollama pull llama3.2:1b

          # Confirm model is available before running eval
          echo "Verifying model is listed..."
          curl -s http://localhost:11434/api/tags | python3 -c "import sys,json; tags=json.load(sys.stdin)['models']; print([m['name'] for m in tags])"

      - name: Run Full Evaluation (All golden questions, Ollama Local, No Judge)
        run: |
          # Full mode: all 204 queries
          # Powered by local Ollama llama3.2:1b model inside GitHub Actions runner
          # Bypasses Groq completely to avoid daily token rate limits.
          python evaluate.py --provider ollama --no-judge --no-diag

      - name: Verify Quality Gate (Full Mode & Regressions)
        run: python ci_gate.py --mode full

      - name: Publish Actions Step Summary
        if: always()
        run: |
          if [ -f eval_summary.md ]; then
            cat eval_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Detailed Run Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-full-${{ github.run_id }}
          path: eval_results/
          retention-days: 30
