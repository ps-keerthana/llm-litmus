name: LLM Eval Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Concurrency control: only one evaluation job runs at a time per branch.
# If a new push arrives while CI is running, the in-progress job is cancelled
# and the new one starts. This prevents multiple jobs competing for the same
# Groq org-level token quota simultaneously.
concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 120      # Full evaluation suite (204 queries) on CPU runner takes up to 90-100 minutes
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache SQLite Evaluation Database
        uses: actions/cache@v4
        with:
          path: eval_platform.db
          key: ${{ runner.os }}-eval-db-v1-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-eval-db-v1-

      - name: Start Ollama Service
        run: |
          docker run -d -v ollama:/root/.ollama -p 11434:11434 --name ollama ollama/ollama
          sleep 5
          docker exec ollama ollama pull llama3.2:1b

      - name: Run Full Evaluation Suite (Ollama Local, No Judge)
        run: |
          # Run full mode: all 204 queries
          # Powered by local Ollama llama3.2:1b model inside GitHub Actions runner
          # Bypasses Groq completely to avoid rate limits on pull requests.
          python evaluate.py --provider ollama --no-judge --no-diag

      - name: Verify CI Quality Gate (Full Mode)
        run: python ci_gate.py --mode full

      - name: Publish Actions Step Summary
        if: always()
        run: |
          if [ -f eval_summary.md ]; then
            cat eval_summary.md >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Detailed Run Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.run_id }}
          path: eval_results/
          retention-days: 30

      # Auto-commit metrics_history.json back to main on successful merge.
      # Commit first, then pull with rebase to prevent local index collision.
      - name: Auto-Commit Metrics Trend History
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add metrics_history.json
          if ! git diff --cached --quiet; then
            git commit -m "ci: update metrics trend history [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      # Post evaluation summary comment directly into Pull Requests
      - name: Post Evaluation Comment to PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('eval_summary.md')) {
              const body = fs.readFileSync('eval_summary.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            }